<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .filter-panel {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .filter-title {
      font-weight: 600;
      margin-bottom: 1rem;
      color: #860909;
    }
    .spicy-slider {
      width: 100%;
      accent-color: #dc3545;
    }
    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12) !important;
    }
    .card-img-top {
      transition: transform 0.4s ease;
    }
    .card:hover .card-img-top {
      transform: scale(.95);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-3 fixed-top" style="background-color: #860909" data-bs-theme="dark">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          <a class="nav-link active" href="MainPage.html" style="font-family: 'Segoe UI'">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
              <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
            </svg>
          </a>
        </div>
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" href="cart.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-cart2" viewBox="0 0 16 16">
              <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l1.25 5h8.22l1.25-5zM5 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
            </svg>
            <span class="badge bg-danger" id="quantity"></span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-5">
    <div class="row mb-4">
      <div class="col-lg-3">
        <div class="filter-panel">
          <h5 class="filter-title">ფილტრი</h5>

          <label class="form-label fw-bold">სიმძაფრე: <span id="spicyValue">ყველა</span></label>
          <input type="range" class="form-range spicy-slider" min="0" max="4" value="0" id="spicyRange" step="1">

          <div class="mt-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="noNuts">
              <label class="form-check-label" for="noNuts">არ შეიცავს თხილს</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="vegan">
              <label class="form-check-label" for="vegan">ვეგანური</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="noSpice">
              <label class="form-check-label" for="noSpice">არ არის მწარე</label>
            </div>
          </div>

          <div class="d-grid gap-2 mt-4">
            <button class="btn btn-outline-secondary" id="resetFilter">გასუფთავება</button>
            <button class="btn btn-danger" id="applyFilter">ფილტრის გამოყენება</button>
          </div>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="row gy-4" id="productRow"></div>
      </div>
    </div>
  </div>

  <script>
    function loadQuantity() {
      fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
        .then(res => res.json())
        .then(data => {
          var total = data.reduce((sum, item) => sum + (item.quantity), 0);
          document.getElementById("quantity").textContent = total;
        })
        
    }

    loadQuantity();

    let allProducts = [];

    fetch("https://restaurant.stepprojects.ge/api/Products/GetAll")
      .then(res => {
        if (!res.ok);
        return res.json();
      })
      .then(products => {
        allProducts = products;
        renderProducts();
      })
      

    function renderProducts() {
      var row = document.getElementById("productRow");
      row.innerHTML = "";
      

      var selectedSpicy = Number(document.getElementById("spicyRange").value);
      var noNuts = document.getElementById("noNuts").checked;
      var noSpice = document.getElementById("noSpice").checked;
      var Vegan = document.getElementById("vegan").checked;

      var filtered = allProducts.filter(p => {
        var spicy = Number(p.spiciness) ;

        if (selectedSpicy > 0 && spicy !== selectedSpicy) return false;
        if (noNuts && p.nuts === true) return false;
        if (noSpice && spicy !== 0) return false;
        if (Vegan && p.vegeterian === false) return false;

        return true;
      });

      filtered.forEach(product => {
        var col = document.createElement("div");
        col.className = "col-md-4 col-sm-6";

        var card = document.createElement("div");
        card.className = "card h-100 shadow-sm";

        var img = document.createElement("img");
        img.src = product.image ;
        img.alt = product.name ;
        img.className = "card-img-top"
       
        card.appendChild(img);

        var cardBody = document.createElement("div");
        cardBody.className = "card-body d-flex flex-column";

        var title = document.createElement("h5");
        title.className = "card-title text-center fw-bold mb-3";
        title.textContent = product.name;
        cardBody.appendChild(title);

        var price = document.createElement("p");
        price.className = "card-text text-center fs-5 fw-bold text-danger mb-3";
        price.textContent = product.price + " ₾";
        cardBody.appendChild(price);

        var infoRow = document.createElement("div");
        infoRow.className = "d-flex flex-wrap gap-2 justify-content-center mb-3 small";

        if (product.nuts === true) {
          var nutsBadge = document.createElement("span");
          nutsBadge.className = "badge bg-warning text-dark";
          nutsBadge.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-1"></i>თხილი';
          infoRow.appendChild(nutsBadge);
        }

        if (product.vegeterian === true) {
          var veganBadge = document.createElement("span");
          veganBadge.className = "badge bg-success";
          veganBadge.innerHTML = '<i class="bi bi-leaf me-1"></i>ვეგანური';
          infoRow.appendChild(veganBadge);
        }

        if (product.spiciness !== undefined) {
          var spicyDiv = document.createElement("div");
          spicyDiv.className = "d-flex align-items-center";

          var label = document.createElement("span");
          label.className = "me-1 fw-bold text-muted";
          label.textContent = "სიმძაფრე:";
          spicyDiv.appendChild(label);

          var value = document.createElement("span");
          if (product.spiciness > 0) {
            for (let i = 0; i < product.spiciness; i++) {
              var fire = document.createElement("i");
              fire.className = "bi bi-fire text-danger me-1";
              value.appendChild(fire);
            }
          } else {
            value.textContent = "არა";
            value.className = "text-muted";
          }
          spicyDiv.appendChild(value);
          infoRow.appendChild(spicyDiv);
        }

        cardBody.appendChild(infoRow);

        var addBtn = document.createElement("button");
        addBtn.className = "btn btn-danger mt-auto w-100";
        addBtn.textContent = "კალათაში დამატება";

        addBtn.onclick = () => {
        
          fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              quantity: 1,
              price: product.price,
              productId: product.id
            })
          })
            .then(res => {
              if (!res.ok);
              Swal.fire({
                text: "პროდუქტი დაემატა",
                icon: "success",
                timer: 1000,
                showConfirmButton: false
              });
              loadQuantity();
            })
        };

        cardBody.appendChild(addBtn);
        card.appendChild(cardBody);
        col.appendChild(card);
        row.appendChild(col);
      });
    }

    document.getElementById("spicyRange").addEventListener("input", e => {
      var value = e.target.value;
      document.getElementById("spicyValue").textContent = value === "0" ? "ყველა" : value;
    });

    document.getElementById("applyFilter").addEventListener("click", renderProducts);
    document.getElementById("resetFilter").addEventListener("click", () => {
      document.getElementById("spicyRange").value = 0;
      document.getElementById("spicyValue").textContent = "ყველა";
      document.getElementById("noNuts").checked = false;
      document.getElementById("vegan").checked = false;
      document.getElementById("noSpice").checked = false;
      renderProducts();
    });

   
    renderProducts();

    
  </script>
</body>

</html>
