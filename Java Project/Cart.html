<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-3 fixed-top" style="background-color: #860909" data-bs-theme="dark">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          <a class="nav-link active" href="MainPage.html" style="font-family: 'Segoe UI'">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
              <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
            </svg>
          </a>
        </div>
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" href="cart.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-cart2" viewBox="0 0 16 16">
              <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l1.25 5h8.22l1.25-5zM5 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
            </svg>
            <span class="badge bg-danger" id="quantity"></span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-5 pt-md-5">
    <div class="row gy-3">
      <table class="table table-striped table-hover" id="cartTable">
        <thead>
          <tr>
            <th>#</th>
            <th>სახელი</th>
            <th>ფასი</th>
            <th>რაოდენობა</th>
            <th>წაშლა</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot class="table-group-divider">
          <tr class="table-active fw-bold">
            <td colspan="2" class="text-end">ჯამი:</td>
            <td colspan="2" id="grandTotal" class="text-danger">0 ₾</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <script>
    function loadQuantity() {
      fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
        .then(res => res.json())
        .then(data => {
          let total = data.reduce((sum, item) => sum + (item.quantity), 0);
          document.getElementById("quantity").textContent = total;
        })
    }

    function showTotal() {
      let total = 0;
      document.querySelectorAll('#cartTable tbody tr').forEach(row => {
        let priceText = row.querySelector('.price-cell span')?.textContent;
        let priceNum = parseFloat(priceText.replace(" ₾", ""));
        total += priceNum;
      });
      document.getElementById("grandTotal").textContent = total + " ₾";
    }

    loadQuantity();

    fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
      .then(res => res.json())
      .then(products => {
        let tbody = document.querySelector("tbody");
        tbody.innerHTML = "";

        products.forEach((product, index) => {
          let unitPrice = product.product.price;

          let td1 = document.createElement("td");
          td1.textContent = index + 1;

          let td2 = document.createElement("td");
          td2.textContent = product.product.name;
          let img = document.createElement("img");
          img.src = product.product.image;
          img.className = "img-thumbnail rounded-5 ms-3";
          img.style.width = "50px";
          td2.appendChild(img);

          let td3 = document.createElement("td");
          td3.className = "fw-bold text-danger price-cell";   
          let priceSpan = document.createElement("span");
          priceSpan.textContent = (unitPrice * product.quantity) + " ₾";
          td3.appendChild(priceSpan);

          let td4 = document.createElement("td");
          let container = document.createElement("div");
          container.className = "d-flex align-items-center gap-3";

          let minus = document.createElement("button");
          minus.className = "btn btn-outline-secondary btn-sm";
          minus.textContent = "-";
          minus.disabled = product.quantity <= 1;

          let number = document.createElement("span");
          number.className = "fw-bold fs-5";
          number.textContent = product.quantity;

          let plus = document.createElement("button");
          plus.className = "btn btn-outline-secondary btn-sm";
          plus.textContent = "+";

          minus.onclick = () => {
            let current = parseInt(number.textContent.trim(), 10);
            if (current <= 1) return;

            fetch(`https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/${product.product.id}`, {
              method: "DELETE"
            })
              .then(res => {
                if (!res.ok);
                return fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    productId: product.product.id,
                    quantity: current - 1,
                    price: unitPrice
                  })
                });
              })
              .then(res => {
                if (!res.ok);
                let newQty = current - 1;
                number.textContent = newQty;
                priceSpan.textContent = (unitPrice * newQty) + " ₾";
                minus.disabled = newQty <= 1;
                loadQuantity();
                showTotal();
              })
              
          };

          plus.onclick = () => {
            let current = parseInt(number.textContent.trim(), 10);

            fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                productId: product.product.id,
                quantity: 1,
                price: unitPrice
              })
            })
              .then(res => {
                if (!res.ok);
                let newQty = current + 1;
                number.textContent = newQty;
                priceSpan.textContent = (unitPrice * newQty) + " ₾";
                minus.disabled = false;
                loadQuantity();
                showTotal();
              })
              
          };

          container.append(minus, number, plus);
          td4.appendChild(container);

          let td5 = document.createElement("td");
          let deleteBtn = document.createElement("button");
          deleteBtn.className = "btn btn-danger";
          deleteBtn.innerHTML = '<i class="fa fa-trash"></i>';

          deleteBtn.onclick = () => {
            fetch(`https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/${product.product.id}`, {
              method: "DELETE"
            })
              .then(res => {
                if (res.ok) {
                  tr.remove();
                  loadQuantity();
                  showTotal();
                }
              })
              
          };

          td5.appendChild(deleteBtn);

          let tr = document.createElement("tr");
          tr.append(td1, td2, td3, td4, td5);
          tbody.appendChild(tr);
        });

        showTotal();
      });
  </script>
</body>
</html>
